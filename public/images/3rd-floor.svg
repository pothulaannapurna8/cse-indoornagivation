<svg width="800" height="1000" xmlns="http://www.w3.org/2000/svg" style="background-color: #1e3a5f;">
  <!-- Background pattern for blueprint look -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6f" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="1000" fill="url(#grid)"/>
  
  <!-- Main building outline -->
  <rect x="50" y="80" width="700" height="650" fill="none" stroke="#fff" stroke-width="3"/>
  
  <!-- TOP ROW - B303 Staff Room, B302, CAB302, Ladies Wash Room -->
  <rect x="60" y="90" width="140" height="100" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="130" y="145" text-anchor="middle" fill="#fff" font-family="Arial" font-size="14" font-weight="bold">B 303</text>
  <text x="130" y="165" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12">Staff Room</text>
  
  <rect x="210" y="90" width="140" height="100" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="280" y="150" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="bold">B 302</text>
  
  <rect x="360" y="90" width="140" height="100" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="430" y="150" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="bold">CAB 302</text>
  
  <rect x="510" y="90" width="230" height="100" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="625" y="135" text-anchor="middle" fill="#fff" font-family="Arial" font-size="14" font-weight="bold">Ladies</text>
  <text x="625" y="155" text-anchor="middle" fill="#fff" font-family="Arial" font-size="14" font-weight="bold">Wash Room</text>
  
  <!-- LEFT SIDE - B303, Lift, Main Staircase -->
  <rect x="60" y="200" width="140" height="100" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="130" y="255" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="bold">B 303</text>
  
  <rect x="210" y="200" width="70" height="100" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="245" y="255" text-anchor="middle" fill="#fff" font-family="Arial" font-size="14" font-weight="bold">Lift</text>
  
  <rect x="290" y="200" width="100" height="100" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="340" y="245" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">Main</text>
  <text x="340" y="265" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">Staircase</text>
  
  <!-- LEFT BOTTOM - B302, B301 IoT Lab -->
  <rect x="60" y="310" width="140" height="120" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="130" y="375" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="bold">B 302</text>
  
  <rect x="60" y="440" width="330" height="140" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="225" y="520" text-anchor="middle" fill="#fff" font-family="Arial" font-size="20" font-weight="bold">B 301</text>
  <text x="225" y="545" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16">IoT Lab</text>
  
  <!-- RIGHT SIDE - C302, C305 Seminar Hall -->
  <rect x="400" y="200" width="140" height="100" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="470" y="255" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="bold">C 302</text>
  
  <rect x="550" y="200" width="190" height="120" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="645" y="250" text-anchor="middle" fill="#fff" font-family="Arial" font-size="14" font-weight="bold">C 305</text>
  <text x="645" y="270" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12">Seminar Hall</text>
  
  <!-- RIGHT MIDDLE - C301 -->
  <rect x="400" y="310" width="140" height="120" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="470" y="380" text-anchor="middle" fill="#fff" font-family="Arial" font-size="16" font-weight="bold">C 301</text>
  
  <!-- RIGHT BOTTOM - C305 Staff Room -->
  <rect x="550" y="330" width="190" height="140" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="645" y="390" text-anchor="middle" fill="#fff" font-family="Arial" font-size="14" font-weight="bold">C 305</text>
  <text x="645" y="410" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12">Staff Room</text>
  
  <!-- Corridor paths shown as dotted lines -->
  <line x1="200" y1="150" x2="200" y2="600" stroke="#fff" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="400" y1="150" x2="400" y2="600" stroke="#fff" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="200" y1="350" x2="750" y2="350" stroke="#fff" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Entrance area at bottom -->
  <rect x="300" y="740" width="200" height="80" fill="none" stroke="#fff" stroke-width="3"/>
  <text x="400" y="785" text-anchor="middle" fill="#fff" font-family="Arial" font-size="18" font-weight="bold">ENTRANCE</text>
  
  <!-- Staircase icon at bottom -->
  <rect x="200" y="850" width="150" height="100" fill="none" stroke="#fff" stroke-width="2" rx="5"/>
  <line x1="220" y1="920" x2="280" y2="880" stroke="#fff" stroke-width="3"/>
  <line x1="230" y1="925" x2="290" y2="885" stroke="#fff" stroke-width="3"/>
  <line x1="240" y1="930" x2="300" y2="890" stroke="#fff" stroke-width="3"/>
  <text x="275" y="940" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">Staircase</text>
  
  <!-- Drinking water icon -->
  <rect x="450" y="850" width="150" height="100" fill="none" stroke="#fff" stroke-width="2" rx="5"/>
  <text x="525" y="905" text-anchor="middle" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">Drinking Water</text>
  
  <!-- Door indicators -->
  <rect x="190" y="140" width="20" height="10" fill="#fff"/>
  <rect x="390" y="140" width="20" height="10" fill="#fff"/>
  
  <!-- Direction arrows on corridors -->
  <polygon points="250,140 270,150 250,160" fill="#fff"/>
  <polygon points="350,140 330,150 350,160" fill="#fff"/>
  <polygon points="450,140 470,150 450,160" fill="#fff"/>
  <polygon points="550,140 530,150 550,160" fill="#fff"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#fff" font-family="Arial" font-size="28" font-weight="bold">3rd Floor</text>
</svg>
