<svg width="600" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="500" fill="#f8f9fa"/>
  
  <!-- Floor layout -->
  <rect x="50" y="50" width="500" height="400" fill="white" stroke="#333" stroke-width="2"/>
  
  <!-- Corridors -->
  <rect x="200" y="50" width="80" height="400" fill="#e9ecef" stroke="#666" stroke-width="1"/>
  <rect x="50" y="200" width="500" height="100" fill="#e9ecef" stroke="#666" stroke-width="1"/>
  
  <!-- Rooms Block B -->
  <rect x="50" y="50" width="150" height="150" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="125" y="125" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">B401</text>
  
  <rect x="50" y="200" width="150" height="100" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="125" y="250" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">B402</text>
  
  <!-- Rooms Block C -->
  <rect x="280" y="50" width="150" height="150" fill="#cce5ff" stroke="#007bff" stroke-width="2"/>
  <text x="355" y="125" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">C401</text>
  
  <rect x="280" y="200" width="150" height="100" fill="#cce5ff" stroke="#007bff" stroke-width="2"/>
  <text x="355" y="250" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">C402</text>
  
  <!-- CAB Rooms -->
  <rect x="430" y="50" width="120" height="150" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="490" y="125" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">CAB401</text>
  
  <rect x="430" y="200" width="120" height="100" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="490" y="250" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">CAB402</text>
  
  <!-- Stairs -->
  <rect x="200" y="350" width="80" height="100" fill="#f8d7da" stroke="#dc3545" stroke-width="2"/>
  <text x="240" y="400" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">STAIRS</text>
  
  <!-- Lift -->
  <rect x="50" y="350" width="60" height="100" fill="#e2e3e5" stroke="#6c757d" stroke-width="2"/>
  <text x="80" y="400" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">LIFT</text>
  
  <!-- Entrance -->
  <rect x="50" y="450" width="100" height="50" fill="#d1ecf1" stroke="#17a2b8" stroke-width="2"/>
  <text x="100" y="480" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">ENTRANCE</text>
  
  <!-- Floor label -->
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#333">4TH FLOOR</text>
</svg>
